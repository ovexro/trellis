name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ─── Build for release ─────────────────────────────────────────────────
  build:
    name: Build release (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            arch: amd64

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config \
            libudev-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      - name: Build Tauri app
        working-directory: app
        run: npx tauri build

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp app/src-tauri/target/release/bundle/deb/*.deb release/ 2>/dev/null || true
          cp app/src-tauri/target/release/bundle/rpm/*.rpm release/ 2>/dev/null || true
          cp app/src-tauri/target/release/bundle/appimage/*.AppImage release/ 2>/dev/null || true
          # Rename AppImage for installer script compatibility
          for f in release/*.AppImage; do
            [ -f "$f" ] && mv "$f" "release/Trellis_${{ matrix.arch }}.AppImage"
          done
          ls -la release/

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.arch }}
          path: release/

  # ─── Publish GitHub Release ────────────────────────────────────────────
  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          body: |
            ## Installation

            ### One-command install (Linux)
            ```bash
            curl -fsSL https://raw.githubusercontent.com/ovexro/trellis/main/install.sh | bash
            ```

            ### Manual download
            - **Ubuntu/Mint/Debian**: Download the `.deb` file
            - **Fedora/RHEL**: Download the `.rpm` file
            - **Any Linux**: Download the `.AppImage` file

            ### Arduino Library
            Install via Arduino Library Manager: `arduino-cli lib install Trellis` (or search "Trellis" in the Arduino IDE Library Manager). For PlatformIO: add `Trellis` to your `platformio.ini` `lib_deps`.

            ---

            If you find Trellis useful, consider [supporting development](https://www.paypal.com/paypalme/ovexro).
